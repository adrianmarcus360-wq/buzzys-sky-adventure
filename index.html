<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>Buzzy's Sky Adventure</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;display:flex;justify-content:center;align-items:center;overflow:hidden;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none}
canvas{display:block;touch-action:none}
</style>
</head>
<body>
<canvas id="gc"></canvas>
<script>
const cv=document.getElementById('gc'),cx=cv.getContext('2d');
const W=800,H=500;
let sc=1;
function resize(){sc=Math.min(window.innerWidth/W,window.innerHeight/H);cv.width=W;cv.height=H;cv.style.width=W*sc+'px';cv.style.height=H*sc+'px';}
resize();window.addEventListener('resize',resize);

// Levels
const LVS=[
  {name:'Numbers 1-5!',items:['1','2','3','4','5'],ic:'#FF6B6B',sky0:'#87CEEB',sky1:'#4FC3F7',gnd:'#4CAF50'},
  {name:'Letters A-E!',items:['A','B','C','D','E'],ic:'#FFD700',sky0:'#FFB6C1',sky1:'#FF69B4',gnd:'#66BB6A'},
  {name:'Numbers 6-10!',items:['6','7','8','9','10'],ic:'#00E5FF',sky0:'#283593',sky1:'#1A237E',gnd:'#2E7D32'},
  {name:'Letters F-J!',items:['F','G','H','I','J'],ic:'#FF7043',sky0:'#FF6F00',sky1:'#E65100',gnd:'#1B5E20'},
  {name:'Shapes!',items:['◆','●','▲','★','■'],ic:'#E040FB',sky0:'#4A148C',sky1:'#6A1B9A',gnd:'#880E4F'},
];

// State
const ST={TITLE:0,PLAY:1,DONE:2,OVER:3};
let gs=ST.TITLE,lvl=1,score=0,lives=3,collected=0,frame=0;
let pillars=[],gems=[],parts=[],clouds=[];
let pillarT=0,gemT=0,flashLbl='',flashT=0;
let titleDY=200,titleDVY=-1.5;

// Drone
const DR={x:140,y:250,vy:0,rot:0,iF:0,
  flap(){this.vy=-9;},
  reset(){this.x=140;this.y=250;this.vy=0;this.iF=0;}
};

// Init clouds
for(let i=0;i<4;i++) clouds.push({x:i*220+80,y:50+Math.random()*80,s:30+Math.random()*25});

function lv(){return LVS[(lvl-1)%LVS.length];}

// Speak
function say(t){
  if(!window.speechSynthesis)return;
  const u=new SpeechSynthesisUtterance(t);
  u.rate=0.8;u.pitch=1.4;
  speechSynthesis.cancel();speechSynthesis.speak(u);
}

// Rounded rect path
function rr(x,y,w,h,r){
  cx.beginPath();cx.moveTo(x+r,y);cx.lineTo(x+w-r,y);cx.quadraticCurveTo(x+w,y,x+w,y+r);
  cx.lineTo(x+w,y+h-r);cx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  cx.lineTo(x+r,y+h);cx.quadraticCurveTo(x,y+h,x,y+h-r);
  cx.lineTo(x,y+r);cx.quadraticCurveTo(x,y,x+r,y);cx.closePath();
}

// Star path
function starPath(px,py,n,ro,ri){
  let a=-Math.PI/2,step=Math.PI/n;
  cx.beginPath();
  for(let i=0;i<n;i++){
    cx.lineTo(px+Math.cos(a)*ro,py+Math.sin(a)*ro);a+=step;
    cx.lineTo(px+Math.cos(a)*ri,py+Math.sin(a)*ri);a+=step;
  }cx.closePath();
}

// Draw drone
function drawDrone(x,y,rot,vy){
  cx.save();cx.translate(x,y);
  const tilt=Math.max(-0.3,Math.min(0.3,(vy||0)*0.035));
  cx.rotate(tilt);
  // shadow
  cx.fillStyle='rgba(0,0,0,0.15)';cx.beginPath();cx.ellipse(0,22,22,5,0,0,Math.PI*2);cx.fill();
  // arms
  cx.strokeStyle='#546E7A';cx.lineWidth=3;
  cx.beginPath();cx.moveTo(-20,-9);cx.lineTo(-28,-19);cx.stroke();
  cx.beginPath();cx.moveTo(20,-9);cx.lineTo(28,-19);cx.stroke();
  // rotors
  drawRotor(-28,-20,rot);drawRotor(28,-20,-rot);
  // body
  cx.fillStyle='#29B6F6';rr(-24,-11,48,22,8);cx.fill();
  cx.fillStyle='#0277BD';rr(-14,-6,28,12,4);cx.fill();
  // eye
  cx.fillStyle='#00E676';cx.beginPath();cx.arc(14,0,4,0,Math.PI*2);cx.fill();
  cx.fillStyle='#fff';cx.beginPath();cx.arc(15.5,-1,1.5,0,Math.PI*2);cx.fill();
  cx.restore();
}

function drawRotor(x,y,a){
  cx.save();cx.translate(x,y);cx.rotate(a);
  cx.strokeStyle='rgba(255,255,255,0.9)';cx.lineWidth=3;cx.lineCap='round';
  cx.beginPath();cx.moveTo(-16,0);cx.lineTo(16,0);cx.stroke();
  cx.beginPath();cx.moveTo(0,-16);cx.lineTo(0,16);cx.stroke();
  cx.fillStyle='#CFD8DC';cx.beginPath();cx.arc(0,0,3,0,Math.PI*2);cx.fill();
  cx.restore();
}

// Background
function drawBG(){
  const l=lv();
  const g=cx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,l.sky0);g.addColorStop(1,l.sky1);
  cx.fillStyle=g;cx.fillRect(0,0,W,H);
  const spd=(1.5+lvl*0.25);
  for(const c of clouds){
    c.x-=spd*0.4;if(c.x<-c.s*2)c.x=W+c.s*2;
    cx.fillStyle='rgba(255,255,255,0.72)';
    cx.beginPath();cx.arc(c.x,c.y,c.s,0,Math.PI*2);
    cx.arc(c.x+c.s*.7,c.y-c.s*.3,c.s*.65,0,Math.PI*2);
    cx.arc(c.x+c.s*1.4,c.y,c.s*.8,0,Math.PI*2);cx.fill();
  }
  cx.fillStyle=l.gnd;cx.fillRect(0,H-55,W,55);
  cx.fillStyle='rgba(0,0,0,0.08)';
  for(let x=0;x<W;x+=35)cx.fillRect(x,H-55,18,5);
}

// Pillars
function spawnPillar(){
  const gap=178;
  const top=60+Math.random()*(H-60-gap-60);
  pillars.push({x:W+40,top,bot:top+gap,w:52});
}
function updatePillars(){
  const spd=2.8+lvl*0.45;
  pillarT++;
  const iv=Math.max(65,125-lvl*8);
  if(pillarT>=iv){spawnPillar();pillarT=0;}
  for(const p of pillars)p.x-=spd;
  while(pillars.length&&pillars[0].x<-80)pillars.shift();
  if(DR.iF>0){DR.iF--;return;}
  for(const p of pillars){
    if(Math.abs(DR.x-p.x)<p.w/2+16){
      if(DR.y-13<p.top||DR.y+11>p.bot)hitDrone();
    }
  }
}
function drawPillars(){
  for(const p of pillars){
    cx.fillStyle='#5D4037';
    cx.fillRect(p.x-p.w/2,0,p.w,p.top);
    cx.fillRect(p.x-p.w/2,p.bot,p.w,H-p.bot);
    cx.fillStyle='#795548';
    rr(p.x-p.w/2-6,p.top-22,p.w+12,22,4);cx.fill();
    rr(p.x-p.w/2-6,p.bot,p.w+12,22,4);cx.fill();
  }
}

// Gems
function spawnGem(){
  const l=lv();
  const item=l.items[Math.floor(Math.random()*l.items.length)];
  gems.push({x:W+30,y:80+Math.random()*(H-170),label:item,color:l.ic,bob:Math.random()*Math.PI*2,r:27});
}
function updateGems(){
  const spd=2.8+lvl*0.45;
  gemT++;
  const iv=Math.max(50,85-lvl*5);
  if(gemT>=iv){spawnGem();gemT=0;}
  for(const g of gems){g.x-=spd;g.bob+=0.06;g.y+=Math.sin(g.bob)*0.55;}
  while(gems.length&&gems[0].x<-65)gems.shift();
  gems=gems.filter(g=>{
    const dx=DR.x-g.x,dy=DR.y-g.y;
    if(Math.sqrt(dx*dx+dy*dy)<g.r+16){
      score+=10;collected++;
      burst(g.x,g.y,g.color);
      flashLbl=g.label;flashT=70;
      say(g.label);
      if(collected>=5)setTimeout(()=>{gs=ST.DONE;say('Amazing! Level complete!');},200);
      return false;
    }
    return true;
  });
}
function drawGems(){
  for(const g of gems){
    cx.save();
    const gl=cx.createRadialGradient(g.x,g.y,0,g.x,g.y,g.r+14);
    gl.addColorStop(0,g.color+'66');gl.addColorStop(1,'transparent');
    cx.fillStyle=gl;cx.beginPath();cx.arc(g.x,g.y,g.r+14,0,Math.PI*2);cx.fill();
    cx.fillStyle=g.color;starPath(g.x,g.y,5,g.r,g.r*.44);cx.fill();
    cx.strokeStyle='rgba(255,255,255,0.5)';cx.lineWidth=1.5;cx.stroke();
    cx.fillStyle='#fff';
    cx.font=`bold ${g.label.length>1?16:21}px Arial`;
    cx.textAlign='center';cx.textBaseline='middle';
    cx.fillText(g.label,g.x,g.y);
    cx.restore();
  }
}

// Particles
function burst(x,y,color){
  for(let i=0;i<18;i++){
    const a=Math.random()*Math.PI*2,v=2+Math.random()*5;
    parts.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v-1.5,life:55,color,r:3+Math.random()*3});
  }
}
function updateParts(){
  for(const p of parts){p.x+=p.vx;p.y+=p.vy;p.vy+=0.14;p.life--;}
  parts=parts.filter(p=>p.life>0);
}
function drawParts(){
  for(const p of parts){
    cx.save();cx.globalAlpha=p.life/55;
    cx.fillStyle=p.color;cx.beginPath();cx.arc(p.x,p.y,p.r,0,Math.PI*2);cx.fill();
    cx.restore();
  }
}

// Drone physics
function updateDrone(){
  DR.vy+=0.45;DR.y+=DR.vy;DR.rot+=0.35;
  if(DR.y+13>H-55){DR.y=H-55-13;hitDrone();}
  if(DR.y-13<0){DR.y=13;DR.vy=0;}
}
function hitDrone(){
  if(DR.iF>0)return;
  lives--;DR.iF=100;DR.vy=-5;
  if(lives<=0){gs=ST.OVER;say('Oh no! Try again!');}
  else say('Oops!');
}

// HUD
function drawHUD(){
  const l=lv();
  cx.fillStyle='rgba(0,0,0,0.4)';rr(10,10,130,38,10);cx.fill();
  cx.fillStyle='#FFD700';cx.font='bold 20px Arial';cx.textAlign='left';cx.textBaseline='middle';
  cx.fillText('⭐ '+score,20,29);

  cx.fillStyle='rgba(0,0,0,0.4)';rr(W/2-55,10,110,38,10);cx.fill();
  cx.fillStyle='#fff';cx.font='bold 18px Arial';cx.textAlign='center';
  cx.fillText('Level '+lvl,W/2,29);

  cx.fillStyle='rgba(0,0,0,0.4)';rr(W-110,10,100,38,10);cx.fill();
  cx.font='22px Arial';cx.textAlign='center';
  let h='';for(let i=0;i<Math.max(0,lives);i++)h+='❤️';
  cx.fillText(h,W-60,29);

  cx.fillStyle='rgba(0,0,0,0.35)';rr(10,57,185,17,5);cx.fill();
  cx.fillStyle=l.ic;
  const pw=Math.min(1,collected/5)*185;
  if(pw>0){rr(10,57,pw,17,5);cx.fill();}
  cx.fillStyle='#fff';cx.font='11px Arial';cx.textAlign='center';
  cx.fillText(collected+'/5 stars',102,65);

  if(flashT>0){
    cx.save();cx.globalAlpha=Math.min(1,flashT/18);
    cx.fillStyle='rgba(0,0,0,0.55)';rr(W/2-65,H/2-58,130,84,18);cx.fill();
    cx.fillStyle=l.ic;
    cx.font=`bold ${flashLbl.length>1?40:54}px Arial`;
    cx.textAlign='center';cx.textBaseline='middle';
    cx.fillText(flashLbl,W/2,H/2-15);
    cx.restore();flashT--;
  }
}

// Title screen
function drawTitle(){
  const l=LVS[0];
  const g=cx.createLinearGradient(0,0,0,H);g.addColorStop(0,l.sky0);g.addColorStop(1,l.sky1);
  cx.fillStyle=g;cx.fillRect(0,0,W,H);
  const spd=0.6;
  for(const c of clouds){
    c.x-=spd;if(c.x<-c.s*2)c.x=W+c.s*2;
    cx.fillStyle='rgba(255,255,255,0.72)';
    cx.beginPath();cx.arc(c.x,c.y,c.s,0,Math.PI*2);
    cx.arc(c.x+c.s*.7,c.y-c.s*.3,c.s*.65,0,Math.PI*2);
    cx.arc(c.x+c.s*1.4,c.y,c.s*.8,0,Math.PI*2);cx.fill();
  }
  cx.fillStyle=l.gnd;cx.fillRect(0,H-55,W,55);

  titleDVY+=0.055;if(Math.abs(titleDVY)>2)titleDVY=-2;
  titleDY+=titleDVY;titleDY=Math.max(80,Math.min(300,titleDY));
  DR.rot+=0.35;
  drawDrone(W*0.28,titleDY,DR.rot,0);

  cx.fillStyle='rgba(0,0,0,0.38)';rr(W*0.42,55,W*0.52,125,22);cx.fill();
  cx.textAlign='center';cx.textBaseline='middle';
  cx.strokeStyle='#E65100';cx.lineWidth=3;
  cx.fillStyle='#FFD700';cx.font='bold 52px Arial';
  cx.strokeText("BUZZY'S",W*0.68,105);cx.fillText("BUZZY'S",W*0.68,105);
  cx.font='bold 34px Arial';
  cx.strokeText('SKY ADVENTURE',W*0.68,155);cx.fillText('SKY ADVENTURE',W*0.68,155);

  const pulse=0.92+0.08*Math.sin(frame*0.07);
  cx.save();cx.translate(W/2,310);cx.scale(pulse,pulse);cx.translate(-W/2,-310);
  cx.fillStyle='#E91E63';rr(W/2-155,288,310,60,32);cx.fill();
  cx.fillStyle='#fff';cx.font='bold 28px Arial';cx.textAlign='center';cx.textBaseline='middle';
  cx.fillText('🚁  TAP TO FLY!',W/2,318);cx.restore();

  cx.fillStyle='rgba(0,0,0,0.35)';rr(W/2-195,388,390,46,14);cx.fill();
  cx.fillStyle='#fff';cx.font='16px Arial';cx.textAlign='center';cx.textBaseline='middle';
  cx.fillText('Collect ⭐ stars to learn numbers & letters!',W/2,411);
}

// Level complete screen
function drawDone(){
  cx.fillStyle='rgba(0,0,0,0.6)';cx.fillRect(0,0,W,H);
  // confetti
  if(frame%3===0){
    const colors=['#FFD700','#FF6B9D','#4ECDC4','#A29BFE','#FD79A8'];
    burst(Math.random()*W,Math.random()*H/2,colors[Math.floor(Math.random()*colors.length)]);
  }
  drawParts();
  cx.fillStyle='#fff';rr(W/2-200,H/2-150,400,300,25);cx.fill();
  cx.fillStyle='#FF6B00';cx.font='bold 48px Arial';cx.textAlign='center';cx.textBaseline='middle';
  cx.fillText('⭐ AMAZING! ⭐',W/2,H/2-95);
  cx.fillStyle='#333';cx.font='bold 26px Arial';cx.fillText('Level '+lvl+' Complete!',W/2,H/2-40);
  cx.fillStyle='#666';cx.font='22px Arial';cx.fillText('Score: '+score,W/2,H/2+5);
  cx.fillStyle='#4CAF50';rr(W/2-130,H/2+55,260,60,30);cx.fill();
  cx.fillStyle='#fff';cx.font='bold 26px Arial';
  cx.fillText(lvl>=LVS.length?'🏆 Play Again!':'Next Level ▶',W/2,H/2+85);
}

// Game over screen
function drawOver(){
  cx.fillStyle='rgba(0,0,0,0.68)';cx.fillRect(0,0,W,H);
  cx.fillStyle='#fff';rr(W/2-185,H/2-135,370,270,25);cx.fill();
  cx.fillStyle='#E53935';cx.font='bold 52px Arial';cx.textAlign='center';cx.textBaseline='middle';
  cx.fillText('😢 Oops!',W/2,H/2-75);
  cx.fillStyle='#333';cx.font='bold 26px Arial';cx.fillText('Score: '+score,W/2,H/2-20);
  cx.fillStyle='#555';cx.font='20px Arial';cx.fillText('You did great! Try again!',W/2,H/2+20);
  cx.fillStyle='#E91E63';rr(W/2-120,H/2+60,240,55,28);cx.fill();
  cx.fillStyle='#fff';cx.font='bold 24px Arial';cx.fillText('🚁 Try Again!',W/2,H/2+87);
}

// Reset
function resetAll(){
  DR.reset();pillars=[];gems=[];parts=[];
  pillarT=0;gemT=0;score=0;lives=3;collected=0;lvl=1;flashT=0;
}
function nextLevel(){
  if(lvl>=LVS.length){resetAll();gs=ST.TITLE;return;}
  lvl++;DR.reset();pillars=[];gems=[];parts=[];
  pillarT=0;gemT=0;collected=0;flashT=0;
  lives=Math.min(3,lives+1);
  gs=ST.PLAY;
  say('Level '+lvl+'! '+lv().name);
}

// Input
function onInput(e){
  e.preventDefault();
  if(gs===ST.TITLE){gs=ST.PLAY;say('Fly Buzzy fly!');return;}
  if(gs===ST.PLAY){DR.flap();return;}
  if(gs===ST.DONE){nextLevel();return;}
  if(gs===ST.OVER){resetAll();gs=ST.TITLE;return;}
}
cv.addEventListener('click',onInput);
cv.addEventListener('touchstart',onInput,{passive:false});
document.addEventListener('keydown',e=>{if(e.code==='Space'||e.code==='ArrowUp')onInput(e);});

// Loop
function loop(){
  frame++;
  cx.clearRect(0,0,W,H);
  if(gs===ST.TITLE){
    drawTitle();
  } else if(gs===ST.PLAY){
    drawBG();
    updatePillars();updateGems();updateDrone();updateParts();
    drawPillars();drawGems();
    if(DR.iF===0||Math.floor(DR.iF/6)%2===0)drawDrone(DR.x,DR.y,DR.rot,DR.vy);
    drawParts();drawHUD();
  } else if(gs===ST.DONE){
    drawBG();drawPillars();drawGems();drawDrone(DR.x,DR.y,DR.rot,0);
    updateParts();drawDone();
  } else if(gs===ST.OVER){
    drawBG();drawOver();
  }
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
